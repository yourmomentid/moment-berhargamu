<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Moment ID — Halaman Kenangan</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: #fdf5f7;
    color: #3a1c28;
    min-height: 100vh;
  }

  .page-wrap {
    max-width: 480px;
    margin: 0 auto;
    padding: 0 0 60px;
  }

  /* HEADER */
  .header {
    background: linear-gradient(170deg, #f9e0e8 0%, #fdf0f4 60%, #fdf5f7 100%);
    padding: 48px 28px 36px;
    text-align: center;
    position: relative;
  }

  .brand-mark {
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.22em;
    color: #c4718a;
    text-transform: uppercase;
    margin-bottom: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .brand-mark::before,
  .brand-mark::after {
    content: '';
    display: inline-block;
    width: 24px;
    height: 0.5px;
    background: #e0a0b4;
  }

  .hero-name {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    font-weight: 400;
    color: #6b1e36;
    line-height: 1.2;
    margin-bottom: 8px;
  }

  .hero-subtitle {
    font-size: 13px;
    font-weight: 300;
    color: #b5607a;
    letter-spacing: 0.06em;
  }

  .butterfly-deco {
    font-size: 22px;
    margin-bottom: 16px;
    display: block;
    opacity: 0.85;
  }

  /* PHOTO */
  .photo-section {
    margin: 0 24px;
    transform: translateY(-20px);
  }

  .photo-frame {
    border-radius: 16px;
    overflow: hidden;
    background: #f0d8e0;
    aspect-ratio: 4/3;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 3px solid white;
    box-shadow: 0 8px 32px rgba(180, 80, 110, 0.12);
  }

  .photo-frame img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: none;
  }

  .photo-placeholder {
    text-align: center;
    color: #c490a4;
  }

  .photo-placeholder svg {
    width: 36px;
    height: 36px;
    margin-bottom: 8px;
    opacity: 0.5;
  }

  .photo-placeholder p {
    font-size: 12px;
    opacity: 0.6;
  }

  /* MESSAGE */
  .message-section {
    padding: 4px 24px 0;
  }

  .message-card {
    background: white;
    border-radius: 16px;
    padding: 28px 24px;
    border: 0.5px solid #f0d0da;
    position: relative;
  }

  .quote-mark {
    font-family: 'Playfair Display', serif;
    font-size: 64px;
    color: #f0c0d0;
    line-height: 0.6;
    display: block;
    margin-bottom: 16px;
  }

  .message-text {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    font-style: italic;
    line-height: 1.8;
    color: #5a2535;
  }

  .message-from {
    margin-top: 20px;
    padding-top: 16px;
    border-top: 0.5px solid #f5e0e6;
    font-size: 12px;
    color: #b5607a;
    text-align: right;
    font-weight: 500;
    letter-spacing: 0.04em;
  }

  /* DETAILS */
  .details-section {
    margin: 20px 24px 0;
    background: white;
    border-radius: 16px;
    padding: 20px 24px;
    border: 0.5px solid #f0d0da;
    display: flex;
    gap: 0;
  }

  .detail-item {
    flex: 1;
    text-align: center;
  }

  .detail-item + .detail-item {
    border-left: 0.5px solid #f0d8e0;
  }

  .detail-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.1em;
    color: #c4918a;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .detail-value {
    font-family: 'Playfair Display', serif;
    font-size: 14px;
    color: #6b1e36;
  }

  /* FOOTER */
  .page-footer {
    margin-top: 40px;
    text-align: center;
    padding: 0 24px;
  }

  .footer-brand {
    font-size: 10px;
    letter-spacing: 0.18em;
    color: #d4a0b0;
    text-transform: uppercase;
  }

  .footer-tagline {
    font-family: 'Playfair Display', serif;
    font-size: 11px;
    font-style: italic;
    color: #e0b8c4;
    margin-top: 4px;
  }

  /* LOADING STATE */
  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
    gap: 12px;
    color: #c490a4;
    font-size: 13px;
  }

  .spinner {
    width: 28px;
    height: 28px;
    border: 2px solid #f0d0da;
    border-top-color: #d4607a;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .error-state {
    text-align: center;
    padding: 60px 24px;
    color: #b5607a;
  }

  .error-state h2 {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    margin-bottom: 8px;
  }

  .error-state p {
    font-size: 13px;
    opacity: 0.7;
  }

  /* FADE IN */
  .fade-in {
    animation: fadeIn 0.6s ease forwards;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="page-wrap">
  <div class="loading" id="loadingState">
    <div class="spinner"></div>
    <span>Membuka kenangan...</span>
  </div>

  <div id="mainContent" style="display:none;">
    <div class="header fade-in">
      <span class="butterfly-deco">🦋</span>
      <div class="brand-mark">Your Moment ID</div>
      <h1 class="hero-name" id="heroName">Nama Wisudawan</h1>
      <p class="hero-subtitle" id="heroSubtitle">Wisuda · Tanggal</p>
    </div>

    <div class="photo-section fade-in" style="animation-delay:0.15s;">
      <div class="photo-frame">
        <img id="mainPhoto" src="" alt="Foto kenangan" />
        <div class="photo-placeholder" id="photoPlaceholder">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="3" width="18" height="18" rx="3"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <path d="M21 15l-5-5L5 21"/>
          </svg>
          <p>Foto kenangan</p>
        </div>
      </div>
    </div>

    <div class="message-section fade-in" style="animation-delay:0.25s;">
      <div class="message-card">
        <span class="quote-mark">"</span>
        <p class="message-text" id="messageText">Pesan akan muncul di sini.</p>
        <div class="message-from" id="messageFrom">— Dari seseorang</div>
      </div>
    </div>

    <div class="details-section fade-in" style="animation-delay:0.35s;">
      <div class="detail-item">
        <p class="detail-label">Wisudawan</p>
        <p class="detail-value" id="detailName">—</p>
      </div>
      <div class="detail-item">
        <p class="detail-label">Tanggal</p>
        <p class="detail-value" id="detailDate">—</p>
      </div>
    </div>

    <div class="page-footer fade-in" style="animation-delay:0.45s;">
      <p class="footer-brand">✦ Your Moment ID ✦</p>
      <p class="footer-tagline">Rayakan Perjuanganmu</p>
    </div>
  </div>

  <div class="error-state" id="errorState" style="display:none;">
    <h2>Kenangan belum tersimpan</h2>
    <p>Halaman ini belum diisi.<br>Silakan hubungi pengirim hadiah kamu.</p>
  </div>
</div>

<script>
  function getParam(key) {
    return new URLSearchParams(window.location.search).get(key);
  }

  function decodeData() {
    const raw = getParam('d');
    if (!raw) return null;
    try {
      return JSON.parse(atob(decodeURIComponent(raw)));
    } catch(e) {
      return null;
    }
  }

  window.addEventListener('DOMContentLoaded', function() {
    setTimeout(function() {
      const data = decodeData();
      document.getElementById('loadingState').style.display = 'none';

      if (!data) {
        document.getElementById('errorState').style.display = 'block';
        return;
      }

      document.getElementById('mainContent').style.display = 'block';

      if (data.name) {
        document.getElementById('heroName').textContent = 'Selamat, ' + data.name + '!';
        document.getElementById('detailName').textContent = data.name;
        document.title = 'Untuk ' + data.name + ' — Your Moment ID';
      }

      if (data.date) {
        document.getElementById('heroSubtitle').textContent = 'Wisuda · ' + data.date;
        document.getElementById('detailDate').textContent = data.date;
      }

      if (data.message) {
        document.getElementById('messageText').textContent = data.message;
      }

      if (data.from) {
        document.getElementById('messageFrom').textContent = '— ' + data.from;
      }

      if (data.photo) {
        const img = document.getElementById('mainPhoto');
        img.src = data.photo;
        img.style.display = 'block';
        document.getElementById('photoPlaceholder').style.display = 'none';
      }
    }, 800);
  });
</script>
</body>
</html>
